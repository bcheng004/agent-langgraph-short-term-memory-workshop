bundle:
  name: agent_langgraph_short_term_memory

resources:
  apps:
    agent_langgraph_short_term_memory:
      name: "bo-agents-on-apps-workshop"
      description: "LangGraph agent application with short-term memory"
      source_code_path: ./
      config:
        command: ["uv", "run", "start-app"]
        env:
          - name: MLFLOW_TRACKING_URI
            value: "databricks"
          - name: MLFLOW_REGISTRY_URI
            value: "databricks-uc"
          - name: API_PROXY
            value: "http://localhost:8000/invocations"
          - name: CHAT_APP_PORT
            value: "3000"
          - name: CHAT_PROXY_TIMEOUT_SECONDS
            value: "300"
          - name: MLFLOW_EXPERIMENT_ID
            value_from: "experiment"
          - name: LAKEBASE_AUTOSCALING_PROJECT
            value: "bo-lb-memory"
          - name: LAKEBASE_AUTOSCALING_BRANCH
            value: "bo-lb-memory-branch"

      # Resources which this app has access to
      resources:
        - name: 'experiment'
          experiment:
            experiment_id: "1992881860367922"
            permission: 'CAN_MANAGE'
        # See: .claude/skills/add-tools/examples/lakebase-autoscaling.yaml
        - name: 'postgres'
          postgres:
            branch: "projects/bo-lb-memory/branches/bo-lb-memory-branch"
            database: "projects/bo-lb-memory/branches/bo-lb-memory-branch/databases/db-xv5w-00ibj61nyy"
            permission: 'CAN_CONNECT_AND_CREATE'

targets:
  dev:
    mode: development
    default: true
    # workspace:
    #   host: https://...

  prod:
    mode: production
    # workspace:
    #   host: https://...
    resources:
      apps:
        agent_langgraph_short_term_memory:
          name: agent-langgraph-stm
